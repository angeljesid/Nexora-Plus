<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Plus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
     <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        :root {
            --sidebar-bg: #f8f9fa;
            --accent-color: #0d6efd;
        }
        body { background-color: #f4f7f6; margin: 0; display: flex; min-height: 100vh; }
        
        /* Sidebar Estilo Nexora Plus */
        #sidebar {
            min-width: 250px;
            max-width: 250px;
            background: var(--sidebar-bg);
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid #eee; }
        .logo-text { color: #0d6efd; font-weight: bold; font-size: 1.2rem; }
        
        .nav-menu { flex-grow: 1; padding: 20px 0; }
        .nav-link {
            padding: 12px 25px;
            color: #333;
            text-decoration: none;
            display: flex;
            align-items: center;
            font-weight: 500;
        }
        .nav-link:hover, .nav-link.active { background: #e9ecef; color: var(--accent-color); }
        .nav-link.active { border-right: 4px solid var(--accent-color); }

        /* Contenido Principal */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; }
        .top-navbar { background: #fff; padding: 15px 30px; border-bottom: 1px solid #ddd; }
        
        .form-area { padding: 40px; display: flex; justify-content: center; align-items: flex-start; }
        .form-container { 
            width: 100%; 
            max-width: 550px; 
            background: white; 
            padding: 35px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }
    </style>
</head>
<body>


    <div id="main-content">
        <header class="top-navbar">
            <h4 class="mb-0 text-secondary">Registro de producto</h4>
        </header>

        <div class="form-area">
            <div class="form-container">
                <h2 class="text-center mb-4 text-primary fw-bold">Registro de Producto</h2>
                
                <form th:action="@{/admin/guardar_p}" th:object="${producto}" method="post">
    <input type="hidden" th:field="*{idP}"/>

    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Nombre del Producto</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-box"></i></span>
                <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Teclado Mecánico" required>
            </div>
        </div>
        
        <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Precio Unitario</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-currency-dollar"></i></span>
                <input type="number" step="0.01" th:field="*{precio}" class="form-control" placeholder="Ej: 100.00" required>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">IVA (Decimal)</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-percent"></i></span>
                <input type="number" step="0.01" th:field="*{iva}" class="form-control" placeholder="Ej: 0.19" required>
            </div>
            <small class="text-muted">Use 0.19 para el 19%</small>
        </div>

        <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Stock</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-collection"></i></span>
                <input type="number" th:field="*{stock}" class="form-control" placeholder="Ej: 50" required>
            </div>
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Código de Barras</label>
        <div class="input-group">
            <span class="input-group-text bg-light"><i class="bi bi-upc-scan"></i></span>
            <input type="text" th:field="*{codigoBarras}" class="form-control" placeholder="Ej: 1234567890123" required>
        </div>

    <div class="mb-4">
        <label class="form-label fw-bold text-primary">Proveedor que suministra</label>
        <div class="input-group">
            <span class="input-group-text bg-light"><i class="bi bi-truck"></i></span>
            <select th:field="*{proveedor}" class="form-select" required>
                <option value="" disabled selected>Seleccione un proveedor...</option>
                <option th:each="prov : ${listaProveedores}" 
                        th:value="${prov.idProv}" 
                        th:text="${prov.empresa} + ' (' + ${prov.nombre} + ')' ">
                </option>
            </select>
        </div>
    </div>

    <div class="d-grid gap-2 mt-4">
        <button type="submit" class="btn btn-primary btn-lg shadow-sm">
            <i class="bi bi-check-circle me-2"></i>Guardar Producto
        </button>
        <a th:href="@{/admin/productos}" class="btn btn-link text-secondary">Cancelar y volver</a>
    </div>
</form>
            </div>
        </div>
    </div>
