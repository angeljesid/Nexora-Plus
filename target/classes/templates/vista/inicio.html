<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nexora Plus - Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" th:href="@{/CSS/main.css}">
</head>
<body th:style="'background-image: url(' + @{/imagenes/fondo-patron.png} + '); 
                background-size: cover; 
                background-position: center; 
                background-attachment: fixed; 
                background-repeat: no-repeat;'">

<nav id="sidebar" th:fragment="sidebar(seccion)">
    <div class="sidebar-brand">
        <div class="d-flex justify-content-center">
            <div style="width: 50px; height: 50px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 10px;">
                <i class="bi bi-intersect text-dark fs-4"></i>
            </div>
        </div>
        <h4 class="mb-0">Nexora <span style="color: var(--nexora-gold);">Plus</span></h4>
    </div>

    <ul class="sidebar-nav">
        <li class="nav-item">
            <a th:href="@{/admin/dashboard}" class="nav-link-custom" 
               th:classappend="${seccion == 'home'} ? 'active' : ''">
                <i class="bi bi-house-door"></i> Home
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/admin/individuos}" class="nav-link-custom"
               th:classappend="${seccion == 'clientes'} ? 'active' : ''">
                <i class="bi bi-people"></i> Clientes
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/admin/productos}" class="nav-link-custom"
               th:classappend="${seccion == 'productos'} ? 'active' : ''">
                <i class="bi bi-box-seam"></i> Productos
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/admin/empleados}" class="nav-link-custom"
               th:classappend="${seccion == 'empleados'} ? 'active' : ''">
                <i class="bi bi-person-badge"></i> Empleados
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/admin/proveedores}" class="nav-link-custom"
               th:classappend="${seccion == 'proveedores'} ? 'active' : ''">
                <i class="bi bi-truck"></i> Proveedores
            </a>
        </li>
    </ul>

    <div class="sidebar-footer">
        <a href="#" class="nav-link-custom mb-2">
            <i class="bi bi-gear"></i> Configuración
        </a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn">
                <i class="bi bi-power"></i> Cerrar sesión
            </button>
        </form>
    </div>
</nav>

    <div class="content-wrapper">
        <div class="container-fluid">
            <div class="card card-custom p-5 text-center">
                <h1 class="fw-bold">Bienvenido a Nexora Plus</h1>
                <p class="text-muted">Selecciona una opción en el menú lateral para comenzar a gestionar tu sistema.</p>
                <div class="mt-4">
                    <i class="bi bi-intersect" style="font-size: 4rem; color: var(--nexora-blue);"></i>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
