<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nexora Plus - Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" th:href="@{/imagenes/css/main.css?v=1.2}">
</head>
<body th:style="'background-image: url(' + @{/imagenes/fondo-patron.png} + '); 
                background-size: cover; 
                background-position: center; 
                background-attachment: fixed; 
                background-repeat: no-repeat;'">

    <div th:replace="~{vista/inicio :: sidebar('productos')}"></div>

    <div class="content-wrapper">
        <div class="container-fluid">
            <div class="card card-custom p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold">Gestión de Inventario</h3>
                    <div>
                        <a th:href="@{/admin/nuevo_p}" class="btn btn-success me-2 shadow-sm">
                            <i class="bi bi-plus-lg me-1"></i> Nuevo Producto
                        </a>
                    </div>
                </div>

                <form th:action="@{/admin/productos}" method="get" class="row g-3 mb-4">
                    <div class="col-md-5">
                        <div class="input-group shadow-sm">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="bi bi-search text-primary"></i>
                            </span>
                            <input type="text" name="keyword" th:value="${keyword}" 
                                   class="form-control border-start-0" 
                                   placeholder="Buscar por nombre o código...">
                            <button type="submit" class="btn btn-primary px-4">Buscar</button>
                        </div>
                    </div>
                    <div class="col-auto">
                            <a th:href="@{/admin/productos}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-clockwise"></i> Recargar
                        </a>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Nombre</th>
                                <th>Precio Base</th>
                                <th class="text-center">IVA</th>
                                <th class="text-center">Stock</th>
                                <th>Precio Venta</th>
                                <th class="text-center">Código de Barras</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="prod : ${listaProductos}">
                                <td>
                                    <span th:text="${prod.nombre}" class="fw-bold text-dark"></span>
                                </td>
                                <td th:text="'$ ' + ${prod.precio}"></td>
                                <td th:text="${prod.iva} + '%'" class="text-center text-muted"></td>
                                <td class="text-center">
                                    <span th:text="${prod.stock}" 
                                          class="badge rounded-pill px-3" 
                                          th:classappend="${prod.stock < 6 ? 'bg-danger shadow-sm' : 'bg-success'}">
                                    </span>
                                </td>
                                <td class="text-primary fw-bold">
                                    <i class="bi bi-cash-stack me-1"></i>
                                    <span th:text="'$ ' + ${#numbers.formatDecimal(prod.precioPublico, 1, 2)}"></span>
                                </td>
                                <td class="text-center">
                                    <code class="text-dark bg-light px-2 py-1 rounded" th:text="${prod.codigoBarras}"></code>
                                </td>
                                <td class="text-center">
                                    <div class="btn-group">
                                        <a th:href="@{/admin/editar_p(id=${prod.idP})}" class="btn btn-sm btn-outline-warning">
                                            <i class="bi bi-pencil">Editar</i>
                                        </a>
                                        <a th:href="@{/admin/ver_P(id=${prod.idP})}" class="btn btn-sm btn-outline-info">
                                            <i class="bi bi-eye">Ver</i>
                                        </a>
                                        <a th:href="@{/admin/eliminar_p(id=${prod.idP})}" class="btn btn-sm btn-outline-danger" 
                                           onclick="return confirm('¿Estás seguro de que deseas eliminar este producto?')">
                                            <i class="bi bi-trash">Eliminar</i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div th:if="${#lists.isEmpty(listaProductos)}" class="alert alert-light border text-center mt-3 shadow-sm">
                    <i class="bi bi-info-circle me-2"></i> No se encontraron productos registrados en el sistema.
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
