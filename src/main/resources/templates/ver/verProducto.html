<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Individuo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        body { background-color: #f4f7f6; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
        .card-header { background-color: #0d4761; color: white; border-radius: 15px 15px 0 0 !important; }
        .label-custom { font-weight: bold; color: #495057; width: 120px; display: inline-block; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header p-3">
                    <h3 class="mb-0 text-center">Perfil del Individuo</h3>
                </div>
                <div class="card-body p-4">
                    <div class="mb-3">
                        <span class="label-custom">ID Interno:</span>
                        <span class="badge bg-secondary" th:text="${producto.idP}"></span>
                    </div>
                    <div class="mb-3 border-bottom pb-2">
                        <span class="label-custom">Nombre:</span>
                        <span th:text="${producto.nombre}"></span>
                    </div>
                    <div class="mb-3 border-bottom pb-2">
                        <span class="label-custom">precio:</span>
                        <span th:text="${producto.precio}"></span>
                    </div>
                    <div class="mb-3 border-bottom pb-2">
                        <span class="label-custom">IVA:</span>
                        <span th:text="${producto.iva}"></span>
                    </div>
                    <div class="mb-3 border-bottom pb-2">
                        <span class="label-custom">Stock:</span>
                        <span th:text="${producto.stock}"></span>
                    </div>
                    <div class="mb-3 border-bottom pb-2">
                        <span class="label-custom">Precio de Venta:</span>
                        <span th:text="${#numbers.formatDecimal(producto.precioPublico,1,2)}"></span>
                    </div>
                     <div class="mb-3 border-bottom pb-2">
                        <span class="label-custom">Proveedor:</span>
                        <span th:text="${producto.proveedor.empresa}"></span>
                    </div>
                    <div class="mb-3 border-bottom pb-2">
                        <span class="label-custom">Código de Barras:</span>
                        <span th:text="${producto.codigoBarras}"></span>
                    </div>
                <div class="card-footer bg-white p-3 text-center border-0">
                    <a th:href="@{/admin/editar_p(id=${producto.idP})}" class="btn btn-warning px-4">Modificar Datos</a>
                    <a th:href="@{/admin/productos}" class="btn btn-outline-primary px-4">Volver al Inicio</a>
                </div>
                    </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
