<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Plus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
     <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        :root {
            --sidebar-bg: #f8f9fa;
            --accent-color: #0d6efd;
        }
        body { background-color: #f4f7f6; margin: 0; display: flex; min-height: 100vh; }
        
        /* Sidebar Estilo Nexora Plus */
        #sidebar {
            min-width: 250px;
            max-width: 250px;
            background: var(--sidebar-bg);
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid #eee; }
        .logo-text { color: #0d6efd; font-weight: bold; font-size: 1.2rem; }
        
        .nav-menu { flex-grow: 1; padding: 20px 0; }
        .nav-link {
            padding: 12px 25px;
            color: #333;
            text-decoration: none;
            display: flex;
            align-items: center;
            font-weight: 500;
        }
        .nav-link:hover, .nav-link.active { background: #e9ecef; color: var(--accent-color); }
        .nav-link.active { border-right: 4px solid var(--accent-color); }

        /* Contenido Principal */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; }
        .top-navbar { background: #fff; padding: 15px 30px; border-bottom: 1px solid #ddd; }
        
        .form-area { padding: 40px; display: flex; justify-content: center; align-items: flex-start; }
        .form-container { 
            width: 100%; 
            max-width: 550px; 
            background: white; 
            padding: 35px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }
    </style>
</head>
<body>


    <div id="main-content">
        <header class="top-navbar">
            <h4 class="mb-0 text-secondary">Registro de Clientes</h4>
        </header>

        <div class="form-area">
            <div class="form-container">
                <h2 class="text-center mb-4 text-primary fw-bold">Registro de Individuo</h2>
                
                <form th:action="@{/admin/guardar_i}" th:object="${individuo}" method="post">
                    <input type="hidden" th:field="*{idIndividuo}"/>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Nombre</label>
                            <input type="text" pattern="^[A-Za-z\s]+$" th:field="*{nombre}" class="form-control" placeholder="Ej: Juan" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Apellido</label>
                            <input type="text" pattern="^[A-Za-z\s]+$" th:field="*{apellido}" class="form-control" placeholder="Ej: Pérez" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Cédula</label>
                        <input type="text" pattern="[0-9]{10}" th:field="*{cedula}" class="form-control" placeholder="Ej: 1234567890" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Edad</label>
                        <input type="number" min="18" max="100" th:field="*{edad}" class="form-control" placeholder="Mínimo 18 años" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Correo Electrónico</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
                            <input type="email" th:field="*{correo}" class="form-control" placeholder="nombre@correo.com" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Teléfono</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-phone"></i></span>
                            <input type="tel" th:field="*{telefono}" minlength="10" maxlength="10" pattern="[0-9]{10}" class="form-control" placeholder="3001234567" required>
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                            <i class="bi bi-check-circle me-2"></i>Guardar Información
                        </button>
                        <a th:href="@{/admin/individuos}" class="btn btn-link text-secondary">Cancelar y volver</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
