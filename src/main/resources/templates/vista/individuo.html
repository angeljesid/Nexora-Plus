<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nexora Plus - Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" th:href="@{/imagenes/css/main.css?v=1.2}">
</head>
<body th:style="'background-image: url(' + @{/imagenes/fondo-patron.png} + '); 
                background-size: cover; 
                background-position: center; 
                background-attachment: fixed; 
                background-repeat: no-repeat;'">

    <div th:replace="~{vista/inicio :: sidebar('clientes')}"></div>

    <div class="content-wrapper">
        <div class="container-fluid">
            <div class="card card-custom p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold">Clientes</h3>
                    <div>
                        <a th:href="@{/admin/nuevo_i}" class="btn btn-success me-2">
                            <i class="bi bi-plus-lg me-1"></i> Nuevo Individuo
                        </a>
                        <a th:href="@{/admin/individuos/exportar-excel}" class="btn btn-success shadow-sm">
                            <i class="bi bi-file-earmark-excel"></i> Descargar Excel
                        </a>
                    </div>
                </div>

                <form th:action="@{/admin/individuos}" method="get" class="row g-3 mb-4">
                    <div class="col-md-4">
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
                            <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Buscar...">
                        </div>
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-primary">Buscar</button>
                        <a th:href="@{/admin/individuos}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-clockwise"></i> Recargar</a>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Nombre Completo</th>
                                <th class="text-center">Edad</th>
                                <th>Correo</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="ind : ${lista}">
                                <td>
                                    <span th:text="${ind.nombre}" class="fw-bold"></span> 
                                    <span th:text="${ind.apellido}"></span>
                                </td>
                                <td th:text="${ind.edad} + ' años'" class="text-center"></td>
                                <td th:text="${ind.correo}" class="text-primary"></td>
                                <td class="text-center">
                                    <div class="btn-group">
                                        <a th:href="@{/admin/editar_i(id=${ind.idIndividuo})}" 
                                           class="btn btn-sm btn-outline-warning">
                                            <i class="bi bi-pencil"></i> Editar
                                        </a>
                                        <a th:href="@{/admin/ver_i(id=${ind.idIndividuo})}" 
                                           class="btn btn-sm btn-outline-info">
                                            <i class="bi bi-eye"></i> Ver
                                        </a>
                                        <a th:href="@{/admin/eliminar_i(id=${ind.idIndividuo})}" 
                                           class="btn btn-sm btn-outline-danger" 
                                           onclick="return confirm('¿Seguro que deseas eliminar este registro?')">
                                            <i class="bi bi-trash"></i> Eliminar
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
