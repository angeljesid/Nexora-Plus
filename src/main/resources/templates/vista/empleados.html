<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nexora Plus - Empleados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" th:href="@{/imagenes/css/main.css?v=1.2}">
</head>
<body th:style="'background-image: url(' + @{/imagenes/fondo-patron.png} + '); 
                background-size: cover; 
                background-position: center; 
                background-attachment: fixed; 
                background-repeat: no-repeat;'">

    <div th:replace="~{vista/inicio :: sidebar('empleados')}"></div>

    <div class="content-wrapper">
        <div class="container-fluid">
            <div class="card card-custom p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold">Gestión de Empleados</h3>
                    <a th:href="@{/admin/nuevo_e}" class="btn btn-success shadow-sm">
                        <i class="bi bi-person-plus-fill me-1"></i> Agregar Empleado
                    </a>
                </div>

                <form th:action="@{/admin/empleados}" method="get" class="row g-3 mb-4">
                    <div class="col-md-5">
                        <div class="input-group shadow-sm">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="bi bi-search text-primary"></i>
                            </span>
                            <input type="text" name="keyword" th:value="${keyword}" 
                                   class="form-control border-start-0" 
                                   placeholder="Buscar por nombre..." required>
                            <button type="submit" class="btn btn-primary px-4">Buscar</button>
                        </div>
                    </div>
                    <div class="col-auto">
                    <a th:href="@{/admin/empleados}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-clockwise"></i> Recargar
                    </a>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Cédula</th>
                                <th>Nombre Completo</th>
                                <th class="text-center">Edad</th>
                                <th>Contacto</th>
                                <th class="text-center">Estado</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="emp : ${listaEmpleados}" 
                                th:classappend="${!emp.activo} ? 'fila-inactiva' : ''">
                                
                                <td th:text="${emp.cedula}" class="text-muted small"></td>
                                <td>
                                    <span th:text="${emp.nombre}" class="fw-bold"></span> 
                                    <span th:text="${emp.apellido}"></span>
                                </td>
                                <td th:text="${emp.edad}" class="text-center"></td>
                                <td>
                                    <div class="small">
                                        <i class="bi bi-envelope text-primary me-1"></i><span th:text="${emp.correo}"></span><br>
                                        <i class="bi bi-telephone text-success me-1"></i><span th:text="${emp.telefono}"></span>
                                    </div>
                                </td>
                                <td class="text-center">
                                    <a th:href="@{/admin/desactivar_e(id=${emp.idEmpleado})}" 
                                       class="btn btn-sm rounded-pill px-3 shadow-sm"
                                       th:classappend="${emp.activo ? 'btn-success' : 'btn-danger'}"
                                       th:text="${emp.activo ? 'Activo' : 'Inactivo'}">
                                    </a>
                                </td>
                                <td class="text-center">
                                    <div class="btn-group">
                                        <a th:href="@{/admin/editar_e(id=${emp.idEmpleado})}" 
                                           class="btn btn-sm btn-outline-warning">
                                            <i class="bi bi-pencil"></i> Editar
                                        </a>
                                        <a th:href="@{/admin/ver_e(id=${emp.idEmpleado})}" 
                                           class="btn btn-sm btn-outline-info">
                                            <i class="bi bi-eye"></i> Ver
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-end mt-4">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
