<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nexora Plus </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --sidebar-bg: #f8f9fa; --navbar-bg: #0d4761; --accent-color: #0d4761; }
        body { background-color: #f4f7f6; overflow-x: hidden; }
        .wrapper { display: flex; width: 100%; align-items: stretch; }
        #sidebar {
            min-width: 250px; max-width: 250px; background: var(--sidebar-bg);
            transition: all 0.3s; min-height: 100vh; border-right: 1px solid #DAA520;
        }
        #sidebar .sidebar-header { padding: 20px; background: var(--accent-color); }
        #sidebar .sidebar-header h4 { color: #ffffff !important; }
        #sidebar ul li a { padding: 15px 25px; display: block; color: #333; text-decoration: none; }
        #sidebar ul li a:hover { background: #e9ecef; color: var(--accent-color); }
        #content { width: 100%; }
        .navbar-custom { background: var(--navbar-bg); padding: 15px; }
    </style>
</head>
<body class="main-body" th:style="'background-image: url(' + @{/imagenes/fondo-patron.png} + ');'">
    <div class="wrapper">
        <nav id="sidebar">
            <div class="sidebar-header text-center">
                <h4 class="fw-bold mb-0">Nexora<span style="color: #DAA520;"> Plus</span></h4>
            </div>
<ul class="list-unstyled components">
    <li><a th:href="@{/admin/individuos}"><i class="bi bi-people-fill me-2"></i> Gestión Clientes</a></li>
    <li><a th:href="@{/admin/productos}"><i class="bi bi-box-seam me-2"></i> Gestión de productos</a></li>
    <li><a th:href="@{/admin/empleados}"><i class="bi bi-person-badge-fill me-2"></i> Gestión de empleados</a></li>
    <li><a th:href="@{/admin/proveedores}"><i class="bi bi-truck me-2"></i> Gestión de proveedores</a></li>
    <li><a th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-2"></i> Panel de Control</a></li>
</ul>
            <div class="p-4 mt-5">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-danger w-100">Cerrar sesión</button>
                </form>
            </div>
        </nav>

        <div id="content">
            <nav class="navbar navbar-custom">
                <div class="container-fluid justify-content-end">
                    <img th:src="@{/imagenes/logo-nexora.png}" style="width: 100px;">
                </div>
            </nav>
            <div class="container mt-5 text-center">
                <h1>Bienvenido a Nexora Plus</h1>
                <p>Selecciona una opción del menú para comenzar.</p>
            </div>
        </div>
    </div>
</body>
</html>
