<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión | Nexora Plus</title>
    
    <style>
        :root {
            --primary: #0f6c7a;
            --primary-dark: #173b68;
            --accent: #DAA520;
            --text: #1d2a33;
            --muted: #5c6f7d;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f6efe4, #dce8f4);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('/imagenes/fondo-patron.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            }

        .login-layout {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            width: 100%;
            max-width: 1000px;
            min-height: 600px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            backdrop-filter: blur(10px);
        }

        .panel--hero {
            background: linear-gradient(160deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .logo-img {
            width: 180px;      
            height: auto;   
            display: block;  
            margin-bottom: 1rem;  
            object-fit: contain;
            background-image: none !important; 
        }

        .page-title { font-size: 3rem; margin-bottom: 10px; }
        .page-subtitle { font-size: 1.1rem; line-height: 1.6; opacity: 0.9; }

        .panel--form {
            padding: 60px;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .section-title { color: var(--primary-dark); font-size: 2rem; margin-bottom: 10px; }
        .section-copy { color: var(--muted); margin-bottom: 30px; }

        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text); }
        
        input {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #eee;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(15, 108, 122, 0.1);
        }

        .button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .alert-error { background: #fff5f5; color: #c53030; }
        .alert-success { background: #f0fff4; color: #276749; }

        @media (max-width: 850px) {
            .login-layout { grid-template-columns: 1fr; margin: 20px; }
            .panel--hero { display: none; }
        }
    </style>
</head>
<body>

<main class="login-layout">
    <section class="panel panel--hero">
        <img src="/imagenes/logo-nexora.png" alt="Logo" class="logo-img">
        <h1 class="page-title">Nexora <span style="color: var(--accent);">Plus</span></h1>
        <p class="page-subtitle">Sistema administrativo</p>
    </section>

    <section class="panel panel--form">
        <h2 class="section-title">Inicio de sesión</h2>
        <p class="section-copy">Introduce tus credenciales</p>

        <div th:if="${param.error}" class="alert alert-error">
            Usuario o contraseña incorrectos
        </div>

        <div th:if="${param.logout}" class="alert alert-success">
            Sesión cerrada correctamente
        </div>

        <form th:action="@{/procesar-login}" method="post">
            
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" name="username" required>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" class="button">Entrar</button>
        </form>
    </section>
</main>

</body>
</html>
