<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nexora Plus - Historial de Ventas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/imagenes/css/vendedor.css}">
</head>
<body th:style="'background-image: url(' + @{/imagenes/fondo-patron.png} + '); background-attachment: fixed;'">

    <nav th:replace="~{vendedor/barra :: sidebar-vendedor('historial')}"></nav>

    <div class="content-wrapper">
        <div class="container-fluid">
            
            <div class="row mb-4 mt-2">
                <div class="col-12">
                    <div class="card card-pos p-4 d-flex flex-row justify-content-between align-items-center">
                        <div>
                            <h3 class="fw-bold text-dark mb-0">
                                <i class="bi bi-journal-text text-primary me-2"></i>Historial de Ventas
                            </h3>
                            <p class="text-muted mb-0">Registro detallado de transacciones realizadas</p>
                        </div>
                        <div class="text-end">
                            <span class="badge bg-primary p-2 px-3 rounded-pill">
                                <i class="bi bi-calendar3 me-2"></i>Hoy: <span th:text="${#dates.format(#dates.createNow(), 'dd/MM/yyyy')}"></span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-12">
                    <div class="card card-pos p-4">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">ID Venta</th>
                                        <th>Fecha y Hora</th>
                                        <th>Cliente</th>
                                        <th class="text-end">Total Facturado</th>
                                        <th class="text-center">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="venta : ${ventas}">
                                        <td class="ps-4 fw-bold" th:text="'#' + ${venta.idVenta}"></td>
                                        <td>
                                            <i class="bi bi-clock me-2 text-muted"></i>
                                            <span th:text="${#temporals.format(venta.fechaVenta, 'dd/MM/yyyy HH:mm')}"></span>
                                        </td>
                                        <td>
                                            <div class="d-flex align-items-center">
                                                <div class="rounded-circle bg-light d-flex align-items-center justify-content-center me-2" style="width: 35px; height: 35px;">
                                                    <i class="bi bi-person text-secondary"></i>
                                                </div>
                                                <span th:text="${venta.cliente != null ? venta.cliente.nombre + ' ' + venta.cliente.apellido : 'Cliente Final'}"></span>
                                            </div>
                                        </td>
                                        <td class="text-end fw-bold text-primary">
                                            $<span th:text="${#numbers.formatDecimal(venta.total, 0, 'COMMA', 0, 'POINT')}"></span>
                                        </td>
                                        <td class="text-center">
                                            <button class="btn btn-outline-primary btn-sm rounded-pill px-3" 
                                                    th:onclick="'DetalleModulo.verDetalle(' + ${venta.idVenta} + ')'"
                                                    data-bs-toggle="modal" data-bs-target="#modalDetalle">
                                                <i class="bi bi-eye me-1"></i> Ver Detalle
                                            </button>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(ventas)}">
                                        <td colspan="5" class="text-center py-5 text-muted">
                                            <i class="bi bi-inbox fs-1 d-block mb-3"></i>
                                            No se han registrado ventas aún.
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalDetalle" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0" style="border-radius: 20px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-bold"><i class="bi bi-receipt-cutoff me-2"></i>Detalle de la Venta <span id="modalIdVenta"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <table class="table align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Producto</th>
                                <th class="text-center">Cantidad</th>
                                <th class="text-end">P. Unitario</th>
                                <th class="text-end">Subtotal</th>
                            </tr>
                        </thead>
                        <tbody id="listaDetallesVenta">
                        </tbody>
                    </table>
                    <div class="total-box mt-3 text-end">
                        <p class="text-muted small mb-0">TOTAL DE ESTA VENTA</p>
                        <h2 class="fw-bold text-primary mb-0">$<span id="modalTotalVenta">0</span></h2>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script th:inline="javascript">
        const DetalleModulo = {
            // Mantenemos los datos de ventas de forma segura
            ventasData: /*[[${ventas}]]*/ [],

            verDetalle(idVenta) {
                // Buscamos la venta en el array local
                const venta = this.ventasData.find(v => v.idVenta == idVenta);
                if(!venta) {
                    console.error("Venta no encontrada localmente");
                    return;
                }

                document.getElementById('modalIdVenta').innerText = `#${venta.idVenta}`;
                document.getElementById('modalTotalVenta').innerText = venta.total ? venta.total.toLocaleString() : '0';

                const container = document.getElementById('listaDetallesVenta');
                container.innerHTML = ''; // Limpiar previo

                if(venta.detalles && venta.detalles.length > 0) {
                    container.innerHTML = venta.detalles.map(d => {
                        // Verificamos nombres de campos según tu Entity y DB
                        const nombreProd = d.producto ? d.producto.nombre : 'Producto no identificado';
                        const idProd = d.producto ? (d.producto.idP || d.producto.id_p) : 'N/A';
                        const precio = d.precioUnitario || d.precio_unitario || 0;
                        const sub = d.subtotal || 0;

                        return `
                            <tr>
                                <td>
                                    <div class="fw-bold">${nombreProd}</div>
                                    <small class="text-muted">ID: ${idProd}</small>
                                </td>
                                <td class="text-center">${d.cantidad}</td>
                                <td class="text-end">$${precio.toLocaleString()}</td>
                                <td class="text-end fw-bold">$${sub.toLocaleString()}</td>
                            </tr>
                        `;
                    }).join('');
                } else {
                    container.innerHTML = '<tr><td colspan="4" class="text-center">No hay detalles disponibles</td></tr>';
                }
            }
        };
    </script>
</body>
</html>
